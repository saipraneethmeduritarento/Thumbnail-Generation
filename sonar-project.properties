sonar.projectKey=thumbnail-generation
sonar.projectName=Thumbnail-Generation
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Source and test directories
# sonar.sources confirmed from project root layout [app/]
sonar.sources=app
sonar.tests=tests

# Python version — from pyproject.toml:9 (python = "^3.12")
sonar.python.version=3.12

# Coverage report path — matches pytest --cov-report=xml:coverage.xml output
sonar.python.coverage.reportPaths=coverage.xml

# IMPORTANT: main.py / config.py / logger.py / __init__.py are deliberately
# NOT in sonar.exclusions — they must be scanned so that FastAPI rules
# S8392, S8397, S8400, S8401, S8413, S8414 fire on them.
# They are excluded from COVERAGE only via sonar.coverage.exclusions below.
sonar.exclusions=\
  **/migrations/**,\
  **/alembic/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  demo_app/**,\
  testing_prompts/**

sonar.test.exclusions=**/node_modules/**

# CPD (Copy-Paste Detection) exclusions:
# Test files are intentionally excluded from duplication analysis.
# v1/v2 service tests share structure by design (same API contract, same mock patterns).
# Duplicate test boilerplate is acceptable and expected — excluding prevents false positives.
sonar.cpd.exclusions=tests/**

# Coverage exclusions: wiring-only files excluded from coverage requirements
# (still scanned for code quality and FastAPI-specific rules)
sonar.coverage.exclusions=\
  **/migrations/**,\
  **/alembic/**,\
  **/main.py,\
  **/config.py,\
  **/logger.py,\
  **/logging.conf,\
  **/__init__.py
