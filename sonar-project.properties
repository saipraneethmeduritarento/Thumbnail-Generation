sonar.projectKey=thumbnail-generation-service
sonar.projectName=thumbnail-generation-service
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Source and test directories
sonar.sources=app
sonar.tests=tests

# Python version — from pyproject.toml:9 (python = "^3.12")
sonar.python.version=3.12

# Coverage report path — matches pytest --cov-report=xml:coverage.xml output
sonar.python.coverage.reportPaths=coverage.xml

# They are excluded from COVERAGE only via sonar.coverage.exclusions below.
sonar.exclusions=\
  **/migrations/**,\
  **/alembic/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  demo_app/**,\
  testing_prompts/**

# CPD (Copy-Paste Detection) exclusions: Test files are intentionally excluded from duplication analysis.
sonar.cpd.exclusions=tests/**

# Coverage exclusions: wiring-only files excluded from coverage requirements
sonar.coverage.exclusions=\
  **/migrations/**,\
  **/alembic/**,\
  **/main.py,\
  **/config.py,\
  **/logger.py,\
  **/logging.conf,\
  **/__init__.py
